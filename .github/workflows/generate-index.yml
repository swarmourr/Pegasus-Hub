name: Generate Workflows Index

on:
  push:
    branches: [main]
    paths:
      - '**.md'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml -q

      - name: Parse all .md files and build workflows.json
        run: |
          python3 << 'EOF'
          import os, json, re

          SKIP = {'readme.md', 'contributing.md', 'license.md', 'changelog.md'}

          import yaml

          def parse_frontmatter(content):
              # Normalize line endings
              content = content.replace('\r\n', '\n').replace('\r', '\n')
              match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  return None
              try:
                  fm = yaml.safe_load(match.group(1)) or {}
                  # Ensure all values are strings
                  return {k: str(v) if v is not None else '' for k, v in fm.items()}
              except yaml.YAMLError as e:
                  print(f"    YAML parse error: {e}")
                  return None

          workflows = []
          skipped = []

          # Walk entire repo to find .md files (handles subdirectories too)
          for root, dirs, files in os.walk('.'):
              # Skip hidden dirs and data/
              dirs[:] = [d for d in dirs if not d.startswith('.') and d != 'data']
              for filename in sorted(files):
                  if not filename.endswith('.md'):
                      continue
                  if filename.lower() in SKIP:
                      continue

                  filepath = os.path.join(root, filename)
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()

                  meta = parse_frontmatter(content)
                  if meta is None:
                      skipped.append(f"  ⚠ {filepath} — no frontmatter found")
                      continue

                  # Accept 'name' or 'title' as identifier
                  name = meta.get('name') or meta.get('title') or meta.get('Name') or meta.get('Title') or ''
                  if not name:
                      skipped.append(f"  ⚠ {filepath} — no name/title field. Keys found: {list(meta.keys())}")
                      continue

                  wf_id = filename.replace('.md', '')
                  workflows.append({
                      "id":              wf_id,
                      "name":            name,
                      "description":     meta.get('description') or meta.get('Description', ''),
                      "topic":           meta.get('Topic') or meta.get('topic', ''),
                      "github_owner":    meta.get('github_owner', ''),
                      "github_repo":     meta.get('github_repo', ''),
                      "pegasus_version": meta.get('pegasus_version', ''),
                      "license":         meta.get('license', ''),
                      "last_verified":   meta.get('last_verified', ''),
                      "image":           meta.get('image', ''),
                  })
                  print(f"  ✅ {filepath} → {name}")

          if skipped:
              print("\nSkipped files:")
              for s in skipped: print(s)

          os.makedirs('data', exist_ok=True)
          with open('data/workflows.json', 'w', encoding='utf-8') as f:
              json.dump({"count": len(workflows), "workflows": workflows}, f, indent=2)

          print(f"\n✅ Indexed {len(workflows)} workflow(s) → data/workflows.json")
          EOF

      - name: Commit workflows.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/workflows.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: rebuild workflows index [skip ci]"
          git push
