name: Create Workflow from Issue

on:
  issues:
    types: [opened]

jobs:
  validate-and-create:
    if: startsWith(github.event.issue.title, '[WORKFLOW]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate and create workflow
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            const body = context.payload.issue.body || '';
            const errors = [];

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s*\\r?\\n+([\\s\\S]*?)(?=\\r?\\n###|$)`, 'i');
              const match = body.match(regex);
              const val = match ? match[1].trim() : '';
              return (val === '_No response_' || val === '') ? '' : val;
            }

            const fields = {
              name:             extract('Workflow Name'),
              github_owner:     extract('GitHub Username'),
              github_repo:      extract('GitHub Repository URL'),
              topic:            extract('Topic / Domain'),
              pegasus_version:  extract('Pegasus Version'),
              license:          extract('License'),
              last_verified:    extract('Last Verified Date'),
              image:            extract('Workflow Visualization URL'),
              description:      extract('Description'),
              file_description: extract('File Description'),
              how_to_run:       extract('How to Run'),
            };

            // 1. Check required fields
            const required = {
              name:             'Workflow Name',
              github_owner:     'GitHub Username',
              github_repo:      'GitHub Repository URL',
              topic:            'Topic / Domain',
              pegasus_version:  'Pegasus Version',
              license:          'License',
              last_verified:    'Last Verified Date',
              description:      'Description',
              file_description: 'File Description',
              how_to_run:       'How to Run',
            };

            for (const [key, label] of Object.entries(required)) {
              if (!fields[key]) errors.push(`Missing required field: **${label}**`);
            }

            // 2. Validate GitHub URL format
            const ghUrlPattern = /^https:\/\/github\.com\/[\w.-]+\/[\w.-]+/;
            if (fields.github_repo && !ghUrlPattern.test(fields.github_repo)) {
              errors.push(`**GitHub Repository URL** must be a valid GitHub URL (e.g. \`https://github.com/user/repo\`)`);
            }

            // 3. Check repo is public via GitHub API
            if (fields.github_repo && ghUrlPattern.test(fields.github_repo)) {
              try {
                const urlParts = new URL(fields.github_repo).pathname.split('/').filter(Boolean);
                const owner = urlParts[0];
                const repo  = urlParts[1];
                const { data } = await github.rest.repos.get({ owner, repo });
                if (data.private) {
                  errors.push(`**GitHub Repository** \`${owner}/${repo}\` is **private**. It must be public to be listed on PegasusHub.`);
                }
              } catch (e) {
                if (e.status === 404) {
                  errors.push(`**GitHub Repository** \`${fields.github_repo}\` was not found. Make sure the URL is correct and the repository exists.`);
                } else {
                  errors.push(`Could not verify repository visibility: ${e.message}`);
                }
              }
            }

            // --- INVALID: comment and stop ---
            if (errors.length > 0) {
              const list = errors.map(e => `- ${e}`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## ❌ Submission Validation Failed\n\nPlease fix the following issues and resubmit:\n\n${list}\n\n---\n_Once fixed, close this issue and open a new one._`
              });
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['invalid']
                });
              } catch (_) {}
              return;
            }

            // --- VALID: generate and commit .md ---
            const slug = fields.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            const filename = `${slug}.md`;

            const lines = [
              '---',
              `github_owner: "${fields.github_owner}"`,
              `github_repo: "${fields.github_repo}"`,
              `pegasus_version: "${fields.pegasus_version}"`,
              `Topic: "${fields.topic}"`,
              `license: "${fields.license}"`,
              `last_verified: "${fields.last_verified}"`,
              `image: "${fields.image || ''}"`,
              `name: "${fields.name}"`,
              `description: "${fields.description.split('\n')[0].replace(/"/g, "'")}"`,
              '---',
              '',
              `# Title : ${fields.name}`,
              '',
              '## Description',
              fields.description,
              '',
              '## File Description',
              fields.file_description,
              '',
              '## How to run?',
              '```bash',
              fields.how_to_run,
              '```',
              '',
              '## THE WORKFLOW VISUALISATION',
              fields.image ? `![${fields.name}](${fields.image})` : '_No visualization provided._',
            ];

            const content = Buffer.from(lines.join('\n')).toString('base64');

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filename,
              message: `feat: add workflow "${fields.name}" (#${context.issue.number})`,
              content,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Workflow Added!\n\nYour workflow **${fields.name}** has been successfully validated and added to PegasusHub as \`${filename}\`.\n\nIt will appear on the registry on the next page load.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
